name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web + sync Capacitor
        run: npm run build:mobile

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Prepare APK for release
        run: cp android/app/build/outputs/apk/debug/app-debug.apk quepulse.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: quepulse-debug-apk
          path: quepulse.apk
          if-no-files-found: error
          retention-days: 30

      - name: Delete previous latest-apk release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              const rel = await github.rest.repos.getReleaseByTag({ owner, repo, tag: 'latest-apk' });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: rel.data.id });
            } catch (e) { /* first run */ }
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: 'tags/latest-apk' });
            } catch (e) { /* ok */ }

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: QuePulse Latest APK
          body: |
            Automated Android APK from the latest main branch build.
            Download `quepulse.apk` or scan the QR code on the QuePulse desktop site.
          files: quepulse.apk
          make_latest: true
          prerelease: false

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
