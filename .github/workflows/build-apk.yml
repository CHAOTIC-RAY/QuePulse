name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web app and sync Capacitor
        run: npm run build:mobile

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/release.keystore
            echo "ANDROID_KEYSTORE_PATH=$PWD/android/release.keystore" >> $GITHUB_ENV
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> $GITHUB_ENV
            echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> $GITHUB_ENV
            echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> $GITHUB_ENV
            echo "Signed with release keystore"
          else
            echo "No release keystore secrets — APK will be signed with debug key"
          fi

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify APK output
        run: |
          test -f android/app/build/outputs/apk/release/app-release.apk
          ls -lh android/app/build/outputs/apk/release/

      - name: Prepare distributable APK
        run: cp android/app/build/outputs/apk/release/app-release.apk quepulse.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: quepulse-release-apk
          path: quepulse.apk
          if-no-files-found: error
          retention-days: 90

      - name: Delete previous latest-apk release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              const rel = await github.rest.repos.getReleaseByTag({ owner, repo, tag: 'latest-apk' });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: rel.data.id });
            } catch (e) { /* first run */ }
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: 'tags/latest-apk' });
            } catch (e) { /* ok */ }

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: QuePulse Latest APK
          body: |
            ## QuePulse Android APK

            Automated **release** build from `main`.

            ### Install
            1. Download `quepulse.apk` below
            2. On Android: enable **Install unknown apps** for your browser/files app
            3. Open the APK and install

            Or scan the QR code on the [QuePulse desktop site](https://quepulse.chaoticstudio.workers.dev).

            ### Build info
            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.workflow }}
            - Add `ANDROID_KEYSTORE_*` repo secrets for production signing; otherwise CI uses a debug key.
          files: quepulse.apk
          make_latest: true
          prerelease: false

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
